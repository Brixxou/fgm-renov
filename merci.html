<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Merci · FGM RENOV</title>
  <meta name="description" content="Votre demande a bien été envoyée à FGM RENOV.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css?v=4">
  <style>
    .thanks {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--cream);
      padding: 48px 20px;
      text-align: center;
    }
    .thanks-box {
      max-width: 520px;
      background: #fff;
      padding: 48px 32px;
      box-shadow: var(--shadow-md);
      border-top: 4px solid var(--terra);
    }
    .thanks-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: var(--terra);
      color: var(--terra-ink);
      font-size: 32px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }
    .thanks h1 { font-size: 40px; margin-bottom: 14px; }
    .thanks p { color: var(--warm); line-height: 1.7; margin-bottom: 28px; }
  </style>
</head>
<body>
<main class="thanks">
  <div class="thanks-box">
    <div class="thanks-icon" aria-hidden="true">✓</div>
    <h1>Merci&nbsp;!</h1>
    <p>Votre demande a bien été envoyée.<br>Nous revenons vers vous sous <strong>48&nbsp;h</strong>.<br>Pour une urgence, appelez-nous directement.</p>
    <div style="display:flex; flex-wrap:wrap; gap:12px; justify-content:center;">
      <a href="tel:+33768813152" class="btn-primary">✆ 07 68 81 31 52</a>
      <a href="/" class="btn-outline" style="color:var(--dark); border-color:var(--dark);">← Retour à l'accueil</a>
    </div>
  </div>
</main>
</body>
</html>
